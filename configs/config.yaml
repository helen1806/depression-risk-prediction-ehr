# Configuration for Depression Prediction Project

dataset:
  data_path: "datasets/ehr_data.csv"
  target_col: "depression_diagnosis"
  test_size: 0.15
  val_size: 0.15
  random_state: 42

preprocessing:
  imputation_strategy: "mean"
  sampling_method: "easy_ensemble" # options: "easy_ensemble", "smote", "none"
  n_subsamples: 5

training:
  epochs: 50
  batch_size: 32
  lr: 0.01
  l1_lambda: 0.0001
  device: "cpu" # change to cuda if available

models:
  lasso:
    input_dim: null # Dynamically set
  rf:
    n_estimators: 100
    max_depth: 10
  xgboost:
    n_estimators: 100
    max_depth: 3
    learning_rate: 0.1
  mlp:
    hidden_dims: [64, 32]
    dropout: 0.3

explainability:
  use_shap: true
  background_samples: 100
